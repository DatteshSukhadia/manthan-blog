AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP//Z" />

  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#f5f4f0;--surface:#fafaf7;--surface2:#f0ede8;--border:rgba(40,37,29,.10);--divider:#dcd9d5;--text:#28251d;--muted:#7a7974;--faint:#bab9b4;--green:#01696f;--green2:#0c4e54;--r:20px;--r-sm:12px;--r-full:9999px;--shadow-sm:0 2px 8px rgba(0,0,0,.06);--shadow-md:0 8px 30px rgba(0,0,0,.10);--shadow-lg:0 20px 60px rgba(0,0,0,.16);--ease:cubic-bezier(.16,1,.3,1)}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth;scroll-padding-top:72px}
    body{font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
    a{text-decoration:none;color:inherit}img{display:block;max-width:100%}
    button,input{font:inherit;color:inherit;border:0;background:none;cursor:pointer}

    .nav{position:sticky;top:0;z-index:50;background:rgba(245,244,240,.93);backdrop-filter:blur(14px) saturate(1.4);-webkit-backdrop-filter:blur(14px) saturate(1.4);border-bottom:1px solid var(--divider)}
    .nav-inner{max-width:1180px;margin:auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;height:68px}
    .brand{display:flex;align-items:center;gap:12px;flex-shrink:0}
    .brand-logo{width:42px;height:42px;border-radius:10px;object-fit:cover;flex-shrink:0;box-shadow:0 3px 10px rgba(1,89,78,.2)}
    .brand-text{line-height:1}
    .brand-name{font-family:"Instrument Serif",serif;font-size:21px;color:var(--text);letter-spacing:.01em}
    .brand-sub{font-size:10.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-top:3px}
    .nav-actions{display:flex;align-items:center;gap:10px}
    .nav-count{font-size:12px;color:var(--muted);background:var(--surface2);border:1px solid var(--divider);padding:6px 12px;border-radius:var(--r-full)}
    .social-link{display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;border:1.5px solid var(--divider);border-radius:14px;background:var(--surface);color:var(--muted);transition:background .18s var(--ease),transform .18s var(--ease)}
    .social-link:hover{background:var(--surface2);transform:translateY(-1px)}
    .social-link svg{width:18px;height:18px;fill:currentColor}

    .cover{background:linear-gradient(145deg,#014840 0%,#01594e 45%,#01696f 100%);padding:72px 24px 64px;text-align:center;color:#fff;position:relative;overflow:hidden}
    .cover::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 65% 55% at 50% 35%,rgba(255,255,255,.06) 0%,transparent 70%);pointer-events:none}
    .cover-inner{position:relative;max-width:600px;margin:auto;display:flex;flex-direction:column;align-items:center}
    .cover-logo{width:min(210px,52vw);height:auto;filter:drop-shadow(0 14px 32px rgba(0,0,0,.30));margin-bottom:22px}
    .cover-title{font-family:"Instrument Serif",serif;font-size:clamp(34px,6vw,62px);letter-spacing:.04em;line-height:1.05;margin-bottom:8px}
    .cover-sub{font-size:clamp(14px,2vw,18px);color:rgba(210,235,230,.9);letter-spacing:.02em}

    .wrap{max-width:1180px;margin:auto;padding:0 24px}
    .pill-row{display:flex;flex-wrap:wrap;gap:10px;padding:36px 0 0}
    .pill{font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:8px 16px;border-radius:var(--r-full);border:1px solid var(--divider);background:var(--surface);color:var(--muted);transition:background .18s var(--ease),color .18s var(--ease),border-color .18s var(--ease)}
    .pill:hover,.pill.active{background:var(--green);color:#fff;border-color:var(--green)}
    .toolbar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;padding:24px 0 14px;border-top:1px solid var(--divider);margin-top:24px}
    .search-box{display:flex;align-items:center;gap:10px;background:var(--surface);border:1.5px solid var(--divider);border-radius:var(--r-full);padding:10px 16px;min-width:300px;max-width:420px;flex:1;transition:border-color .18s var(--ease),box-shadow .18s var(--ease)}
    .search-box:focus-within{border-color:var(--green);box-shadow:0 0 0 3px rgba(1,105,111,.12)}
    .search-box svg{color:var(--muted);flex-shrink:0}
    .search-box input{border:0;outline:0;background:transparent;width:100%;font-size:14px}
    .result-count{font-size:13px;color:var(--muted);background:var(--surface);border:1px solid var(--divider);padding:8px 14px;border-radius:var(--r-full);white-space:nowrap}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:20px;padding:12px 0 72px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:22px;display:flex;flex-direction:column;gap:14px;min-height:210px;cursor:pointer;box-shadow:var(--shadow-sm);transition:transform .22s var(--ease),box-shadow .22s var(--ease),border-color .22s var(--ease)}
    .card:hover{transform:translateY(-4px);box-shadow:var(--shadow-md);border-color:rgba(1,105,111,.22)}
    .card-emoji{font-size:26px;line-height:1}
    .card-title{font-family:"Instrument Serif",serif;font-size:clamp(18px,2vw,26px);line-height:1.2;flex:1}
    .card-meta{display:flex;justify-content:space-between;align-items:center;margin-top:auto}
    .tag{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--green);background:rgba(1,105,111,.10);padding:6px 12px;border-radius:var(--r-full)}
    .arrow{color:var(--faint);font-size:18px}

    .overlay{position:fixed;inset:0;z-index:100;background:rgba(15,14,12,.55);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:24px}
    .overlay.open{display:flex}
    .modal{background:var(--surface);border-radius:24px;width:min(860px,100%);max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--shadow-lg)}
    .modal-head{padding:28px 28px 20px;border-bottom:1px solid var(--divider);position:relative;flex-shrink:0;background:rgba(250,250,247,.96);backdrop-filter:blur(8px)}
    .modal-close{position:absolute;top:20px;right:20px;width:38px;height:38px;border-radius:10px;background:var(--surface2);color:var(--muted);display:flex;align-items:center;justify-content:center;font-size:18px;transition:background .18s}
    .modal-close:hover{background:var(--divider)}
    .modal-tag{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--green)}
    .modal-emoji{font-size:32px;margin:10px 0 6px}
    .modal-title{font-family:"Instrument Serif",serif;font-size:clamp(28px,4vw,46px);line-height:1.08}
    .modal-body{padding:28px;overflow-y:auto;flex:1;color:#514d46;line-height:1.85}
    .modal-body h3{font-family:"Instrument Serif",serif;font-size:28px;color:var(--text);margin:32px 0 10px}
    .modal-body p,.modal-body li{font-size:16.5px;margin-bottom:14px}
    .modal-body ul,.modal-body ol{padding-left:22px}.modal-body li{margin-bottom:8px}
    .modal-body blockquote{margin:0 0 20px;padding:14px 20px;border-left:3px solid var(--green);background:rgba(1,105,111,.06);border-radius:0 14px 14px 0;font-style:italic}
    .modal-body .callout{background:rgba(1,105,111,.07);border:1px solid rgba(1,105,111,.18);padding:16px 18px;border-radius:14px;margin-bottom:18px}
    .modal-body code{font-family:monospace;background:var(--surface2);padding:2px 6px;border-radius:5px;font-size:14px}
    .modal-body table{width:100%;border-collapse:collapse;margin-bottom:18px}
    .modal-body th,.modal-body td{padding:10px 12px;border-bottom:1px solid var(--divider);text-align:left;font-size:15px}
    .modal-body th{font-weight:600;color:var(--text);background:var(--surface2)}
    .modal-foot{padding:18px 28px 24px;border-top:1px solid var(--divider);display:flex;justify-content:space-between;align-items:center;gap:12px;flex-shrink:0}
    .btn-primary{background:var(--green);color:#fff;padding:12px 20px;border-radius:var(--r-full);font-weight:700;font-size:14px;transition:background .18s}
    .btn-primary:hover{background:var(--green2)}
    .nav-btns{display:flex;gap:10px}
    .nav-btn{border:1.5px solid var(--divider);background:var(--surface);padding:10px 16px;border-radius:var(--r-sm);font-size:13px;font-weight:500;transition:background .18s}
    .nav-btn:hover{background:var(--surface2)}.nav-btn:disabled{opacity:.35;cursor:default}
    @media(max-width:768px){.brand-name{font-size:17px}.search-box{min-width:0}.modal-title{font-size:26px}}
  
    .nav-home-btn{display:inline-flex;align-items:center;gap:7px;background:var(--green);color:#fff;padding:8px 16px;border-radius:var(--r-full);font-size:13px;font-weight:600;transition:background .18s var(--ease);text-decoration:none}
    .nav-home-btn:hover{background:var(--green2)}

  </style>
</head>

  <script>
    const ARTICLES = [{"id": 1, "emoji": "🏢", "title": "Tokenization: How blockchain found its footing in the world's most boring assets?", "tag": "FinTech", "url": "https://twisty-study-d16.notion.site/Tokenization-How-blockchain-found-its-footing-in-the-world-s-most-boring-assets-385ae3fcb11f808ebbf3e3562e627284", "body": "<blockquote>What if you could own a piece of land, a government bond, or a private credit fund through the same digital wallet you use to hold crypto?</blockquote><h3>Introduction</h3><p>In 2021, a JPEG of a cartoon monkey sold for $3M. While the world mocked NFTs, developers and fund managers were quietly asking a different question: not \"can we put art on blockchain?\" but \"what if we put <em>everything else</em> on it?\" — bonds, loans, government debt. That became <strong>tokenization</strong>.</p><div class='callout'><strong>Blockchain</strong> is a shared digital ledger — copied across thousands of computers, impossible to erase unilaterally, with every block cryptographically sealed.</div><h3>How It Works</h3><p>An underlying asset (e.g., a U.S. Treasury) is placed into a legal SPV. Digital tokens representing ownership are issued on a blockchain. Investors receive tokens rather than paper statements.</p><h3>Why These Assets?</h3><ol><li><strong>Institutional demand already existed</strong> — tokenization removed friction.</li><li><strong>Fungibility</strong> — a T-bill is identical to every other T-bill.</li><li><strong>Solving idle yield</strong> — stablecoin holders earning 0% could now earn ~4-5% on-chain.</li></ol><h3>The Catch</h3><ol><li><strong>Smart contract risk</strong> — code bugs can be exploited even when the underlying asset is safe.</li><li><strong>Custodian risk</strong> — trust that the SPV actually holds the claimed assets.</li><li><strong>Regulatory exposure</strong> — DAOs lack legal standing in most jurisdictions.</li></ol>"}, {"id": 2, "emoji": "🎯", "title": "ML101: Bias, Variance and Ensemble Models", "tag": "ML", "url": "https://twisty-study-d16.notion.site/ML101-Bias-Variance-and-Ensemble-Models-367ae3fcb11f80a7995deefdfeba531d", "body": "<blockquote><strong>Bias:</strong> Error from oversimplification. <strong>Variance:</strong> Error from over-sensitivity to training data.</blockquote><h3>The Dartboard Analogy</h3><p>Low bias = darts near the bullseye. Low variance = darts clustered tightly. Formally: <code>Total Error = Bias² + Variance + Irreducible Noise</code></p><h3>Bagging</h3><div class='callout'>Trains multiple models on bootstrap samples, then aggregates. Main effect: <strong>reduces variance</strong>. Used in Random Forests.</div><h3>Boosting</h3><div class='callout'>Trains weak learners sequentially, each correcting the previous one. Main effect: <strong>reduces bias</strong>. XGBoost and LightGBM are leading implementations.</div><table><thead><tr><th>Method</th><th>Effect on Bias</th><th>Effect on Variance</th></tr></thead><tbody><tr><td>Bagging</td><td>Unchanged</td><td>Strongly reduced</td></tr><tr><td>Boosting</td><td>Strongly reduced</td><td>Can increase</td></tr></tbody></table>"}, {"id": 3, "emoji": "📊", "title": "Data Governance and Compliance Pipelines", "tag": "Data", "url": "https://twisty-study-d16.notion.site/Data-Governance-and-Compliance-Pipelines-27cae3fcb11f80e78eb5efca20acdfbd", "body": "<p>As GDPR, CCPA, and HIPAA requirements grow more complex, governance pipelines are no longer optional.</p><h3>Key Components</h3><ul><li><strong>Data Lineage</strong> — Track origin and transformation end-to-end.</li><li><strong>Access Controls</strong> — Role-based and attribute-based policies.</li><li><strong>Audit Logging</strong> — Every read, write, transformation logged with timestamp and user identity.</li><li><strong>Data Classification</strong> — Auto-tag PII, financial, and health records.</li><li><strong>Retention &amp; Deletion</strong> — Enforce \"right to be forgotten\" automatically.</li></ul><h3>Modern Tools</h3><p>Apache Atlas (open-source), Collibra (enterprise), AWS Glue Data Catalog, Azure Purview, Google Dataplex.</p><h3>Stakes</h3><p>GDPR violations can cost up to 4% of global annual revenue. Poor governance creates data swamps — lakes where data becomes unusable.</p>"}, {"id": 4, "emoji": "📉", "title": "Overfitting vs. Underfitting", "tag": "ML", "url": "https://twisty-study-d16.notion.site/Overfitting-vs-Underfittng-27fae3fcb11f804786afd42a58aa0bb4", "body": "<blockquote>\"Practice like never won, play like never lost!\"</blockquote><h3>Core Concepts</h3><ul><li><strong>Overfitting:</strong> Model memorises noise. High training accuracy, poor test performance. High variance.</li><li><strong>Underfitting:</strong> Model is too simple. Poor training and test performance. High bias.</li></ul><h3>Regularisation</h3><div class='callout'>Regularisation penalises model complexity to prevent memorising noise.</div><ul><li><strong>L1 (Lasso):</strong> Drives irrelevant weights to zero — built-in feature selection.</li><li><strong>L2 (Ridge):</strong> Shrinks all weights — smooth, stable decision boundaries.</li></ul><h3>K-Fold Cross-Validation</h3><ol><li>Split data into K folds.</li><li>Train on K-1 folds, test on the remaining fold.</li><li>Repeat K times — every fold serves as test set once.</li><li>Average performance across all K runs.</li></ol>"}, {"id": 5, "emoji": "➡️", "title": "ML101: k-NN", "tag": "ML", "url": "https://twisty-study-d16.notion.site/ML101-k-NN-360ae3fcb11f80a9abcac7e7962681af", "body": "<p>k-Nearest Neighbours predicts by finding the k closest training points and aggregating their labels.</p><h3>Classification: Steps</h3><ol><li>Choose k.</li><li>Compute distances from query to all training points.</li><li>Select k nearest.</li><li>Predict by majority vote.</li></ol><h3>k and the Bias-Variance Tradeoff</h3><ul><li><strong>Small k:</strong> Jagged boundary, high variance (overfitting).</li><li><strong>Large k:</strong> Smooth boundary, high bias (underfitting).</li><li>Optimal k found via cross-validation.</li></ul><h3>Limitations</h3><ul><li>❌ O(n) query time — not scalable.</li><li>❌ Curse of dimensionality — distances lose meaning in high dimensions.</li></ul>"}, {"id": 6, "emoji": "🗄️", "title": "Data Lakes vs. Data Warehouses", "tag": "Data", "url": "https://twisty-study-d16.notion.site/Data-Lakes-vs-Data-Warehouses-279ae3fcb11f800a82dfcf7baf36a1e7", "body": "<h3>Schema-on-Read (Data Lakes)</h3><p>Store raw data in native format. Define schema only when querying. Maximum flexibility, but risks data swamps.</p><h3>Schema-on-Write (Data Warehouses)</h3><p>Define schema before loading. Reliable and fast for structured analytics, but rigid for unstructured data.</p><h3>The Lakehouse: Delta Lake</h3><p>Databricks' Delta Lake combines both worlds with <strong>ACID transactions</strong>:</p><ul><li><strong>Atomic</strong> — all-or-nothing, no partial corruption.</li><li><strong>Consistent</strong> — constraints always validated.</li><li><strong>Isolated</strong> — parallel jobs don't interfere.</li><li><strong>Durable</strong> — changes survive outages.</li></ul><p>Also supports time travel (data versioning) and scalable metadata for production ML workflows.</p>"}, {"id": 7, "emoji": "🗒️", "title": "ML101: Supervised Learning With SVMs", "tag": "ML", "url": "https://twisty-study-d16.notion.site/ML101-Supervised-Learning-With-SVMs-35eae3fcb11f8069b038da44d6fbe62c", "body": "<p>SVMs find the hyperplane that separates classes with the largest possible margin. Points nearest the hyperplane are the <strong>support vectors</strong>.</p><h3>Kernels for Non-Linear Data</h3><ol><li><strong>Linear</strong> — fastest, linearly separable data.</li><li><strong>Polynomial</strong> — parabolic embedding.</li><li><strong>RBF</strong> — exponential decay with distance. Most common.</li><li><strong>Sigmoid</strong> — mirrors logistic regression.</li></ol><h3>Tradeoffs</h3><ul><li>✅ Effective in high dimensions, robust to overfitting.</li><li>❌ Slow on large datasets, sensitive to kernel and C parameters.</li></ul>"}, {"id": 8, "emoji": "🔗", "title": "Data Mesh", "tag": "Data", "url": "https://twisty-study-d16.notion.site/Data-Mesh-276ae3fcb11f807190c3f5f188954f3c", "body": "<p>Data Mesh decentralises data ownership, treating domain data as products rather than centralising everything in a single platform.</p><h3>The Four Principles</h3><ol><li><strong>Domain-Oriented Ownership</strong> — Sales owns sales data; supply chain owns logistics data.</li><li><strong>Data as a Product</strong> — Defined interfaces, SLAs, and documentation for every dataset.</li><li><strong>Self-Serve Infrastructure as a Platform</strong> — Central team provides tooling, not ownership.</li><li><strong>Federated Computational Governance</strong> — Standards set centrally, enforcement automated per-pipeline.</li></ol><h3>Why It Exists</h3><p>Centralised platforms create bottlenecks. Monolithic lakes turn into unnavigable swamps. Data Mesh distributes both ownership and accountability.</p>"}, {"id": 9, "emoji": "🌳", "title": "ML101: Decision Trees", "tag": "ML", "url": "https://twisty-study-d16.notion.site/ML101-Decision-Trees-351ae3fcb11f808fbdabc21df1ec9ef4", "body": "<p>Decision trees recursively split data using feature-based rules. They're the building block for Random Forests and Gradient Boosted Trees.</p><h3>CART Algorithm</h3><ol><li>Select the best feature to split on (Gini Impurity or Information Gain).</li><li>Split data into subsets.</li><li>Repeat recursively until stopping condition.</li></ol><h3>Pruning</h3><ul><li><strong>Pre-pruning:</strong> Limit depth or minimum samples during training.</li><li><strong>Post-pruning:</strong> Grow full tree, then remove branches that don't improve validation performance.</li></ul><h3>Ensemble Extensions</h3><ul><li><strong>Random Forests:</strong> Hundreds of trees on bootstrap samples + random feature subsets. Reduces variance dramatically.</li><li><strong>Gradient Boosting:</strong> Sequential trees fitting residuals. XGBoost, LightGBM, CatBoost are leading libraries.</li></ul>"}, {"id": 10, "emoji": "👁️", "title": "ML101: Regression at a Glance", "tag": "ML", "url": "https://twisty-study-d16.notion.site/ML101-Regression-at-a-Glance-34cae3fcb11f809ea9f8de8dc0a0328d", "body": "<h3>Linear Regression</h3><p>Minimises MSE: <code>ŷ = wX + b</code>. Assumes linearity, independence, homoscedasticity, normality of residuals.</p><h3>Ridge (L2)</h3><p>Adds λ‖w‖² penalty. All features retained but shrunk — prevents overfitting with collinear predictors.</p><h3>Lasso (L1)</h3><p>Adds λ‖w‖₁ penalty. Drives irrelevant coefficients to zero — automatic feature selection.</p><h3>Logistic Regression</h3><p>For classification. Applies sigmoid to output P(class=1). Maximises likelihood of observed labels.</p><h3>Key Diagnostics</h3><ul><li><strong>R²</strong> — proportion of variance explained.</li><li><strong>Residual plots</strong> — detect linearity and homoscedasticity violations.</li><li><strong>VIF</strong> — detect multicollinearity.</li></ul>"}, {"id": 11, "emoji": "📐", "title": "Gradient Descent in Action: How Models Actually Learn", "tag": "ML", "url": "https://twisty-study-d16.notion.site/Gradient-Descent-in-Action-How-Models-Actually-Learn-27cae3fcb11f800b9eecc4a771b17a3e", "body": "<p>Gradient descent minimises a loss function by iteratively adjusting parameters: <code>θ ← θ − α∇L(θ)</code></p><h3>Variants</h3><ul><li><strong>Batch GD</strong> — Entire dataset per update. Converges for convex functions; slow at scale.</li><li><strong>SGD</strong> — One example per update. Fast, noisy — noise can escape local minima.</li><li><strong>Mini-Batch</strong> — Batches of 32–64. Standard in deep learning; efficient on GPUs.</li></ul><h3>Adaptive Optimisers</h3><ul><li><strong>Momentum</strong> — Accumulates velocity, reduces oscillations.</li><li><strong>RMSProp</strong> — Adapts learning rate per parameter.</li><li><strong>Adam</strong> — Momentum + RMSProp. Default for almost all deep learning.</li></ul>"}, {"id": 12, "emoji": "⚖️", "title": "Ethical AI - Detecting and Fixing Biases in Hiring Algorithms", "tag": "AI", "url": "https://twisty-study-d16.notion.site/Ethical-AI-Detecting-and-Fixing-Biases-in-Hiring-Algorithms-29cae3fcb11f80679cdace7b73215812", "body": "<p>Amazon's recruiting AI — trained on male-dominated resumes — penalised applications mentioning women's colleges. The problem: historical bias in training data.</p><h3>Types of Bias</h3><ul><li><strong>Historical bias</strong> — data reflects past discrimination.</li><li><strong>Representation bias</strong> — groups underrepresented in training data.</li><li><strong>Measurement bias</strong> — proxies like zip code correlate with protected attributes.</li><li><strong>Feedback loops</strong> — biased predictions generate new biased training data.</li></ul><h3>Mitigation</h3><ol><li><strong>Pre-processing</strong> — re-weight or resample training data.</li><li><strong>In-processing</strong> — adversarial debiasing.</li><li><strong>Post-processing</strong> — adjust decision thresholds per demographic group.</li></ol><p><strong>Key insight:</strong> It is mathematically impossible to satisfy all fairness metrics simultaneously.</p>"}, {"id": 13, "emoji": "🤖", "title": "Transformers: The Engine Behind GPTs", "tag": "AI", "url": "https://twisty-study-d16.notion.site/Transformers-The-Engine-Behind-GPTs-280ae3fcb11f80d7a1d8ce663ee8d0eb", "body": "<p>\"Attention is All You Need\" (Vaswani et al., 2017) replaced recurrence entirely, enabling parallelisation and better long-range dependencies.</p><h3>Self-Attention</h3><p>Each token computes Q, K, V vectors and attends to all others: <code>softmax(QKᵀ / √d_k) · V</code></p><h3>Architecture Variants</h3><ul><li><strong>Encoder-only (BERT)</strong> — bidirectional; used for understanding.</li><li><strong>Decoder-only (GPT)</strong> — causal masking; used for generation.</li><li><strong>Encoder-Decoder (T5)</strong> — sequence-to-sequence tasks.</li></ul><h3>Scaling Laws &amp; Emergence</h3><p>As models grew to hundreds of billions of parameters, emergent capabilities appeared: in-context learning, chain-of-thought reasoning, instruction following.</p>"}, {"id": 14, "emoji": "☁️", "title": "Edge Computing for Distributed Data", "tag": "Data", "url": "https://twisty-study-d16.notion.site/Edge-Computing-for-Distributed-Data-27cae3fcb11f80918f04c7b74826894b", "body": "<p>Edge computing moves processing to where data originates — reducing latency, bandwidth costs, and centralisation risk.</p><h3>The Edge-Cloud Continuum</h3><ul><li><strong>On-device</strong> — most constrained; inference on the device itself.</li><li><strong>Near-edge (MEC)</strong> — co-located with telecom base stations; sub-10ms latency.</li><li><strong>Regional / Fog</strong> — small data centres between device and central cloud.</li><li><strong>Central cloud</strong> — training, archiving, global aggregation.</li></ul><h3>Key Use Cases</h3><ul><li>Autonomous vehicles — real-time decisions can't afford cloud round trips.</li><li>Industrial IoT — predictive maintenance from sensors.</li><li>Healthcare — on-device vital-sign monitoring without cloud dependency.</li></ul><h3>Challenges</h3><ul><li>Model compression required (quantisation, pruning, knowledge distillation).</li><li>Zero-trust networking and hardware attestation for security.</li></ul>"}];

  <blockquote>
  <p><strong><em>What if I told you that you could own a piece of land, a government bond, or even a private credit fund through the same digital wallet you use to hold cryptocurrencies?</em></strong> That idea sits at the heart of one of finance's fastest-growing trends: tokenization.
  </p>
  </blockquote>
  <h3>Introduction</h3>
  <p>You’ve probably heard the story by now. In 2021, a JPEG of a cartoon monkey sold for $3 Million. People laughed, then panicked, then bought in. Then the market crashed, and everyone moved on.</p>
  <p>But while the world was busy mocking NFTs, something quieter was happening in the background. Developers, fund managers and institutional desks were asking a different question. The question wasn’t “<em>can we put art on blockchain?</em>” but “<em>what if we put everything else on it?</em>”</p>
  <p>Not monkey pictures. Bonds. Loans. Government debt. The kind of assets that don’t make headlines but quietly power the entire global financial system. </p>
  <p>That question turned into a market now worth tens of billions of dollars, and it goes by a name most people outside of finance haven’t heard: <strong>tokenization.</strong></p>
  <p>At it’s core, tokenization means taking a real-world financial asset - a U.S. Treasury, a private loan, a share in fund - and representing it as a digital token on blockchain. Same asset, different wrapper. But that wrapper changes a surprising amount about how the asset behaves, who can access it, and what you can do with it.</p>
  <aside>
  💡

  Blockchain is a shared digital ledger - a running record of transactions that is copied and stored across thousands of computers simultaneously, rather than held in one central place. Every new batch of transactions gets bundled into a “block”, cryptographically sealed, and chained to the one before it, making the history virtually impossible to alter or delete. Because no single bank, government, company controls it, no one party can quietly revise it. 

  Think of it less like a private database and more like a public spreadsheet that everyone can read, no one can erase, and everyone can write to - as long as they follow the rules.

  </aside>

  <p>The story of how tokenisation went from digital art collectibles to government bonds isn’t just a tech story. Its a story about what happens when a genuinely useful idea finally finds the right problem to solve, and the complications that follow when it does.</p>
  <h3>How does tokenization work in practice?</h3>
  <p>It involves placing an underlying asset (e.g., a Treasury portfolio or a pool of loans) into a legal wrapper, such as a fund or a special purpose vehicle (SPV), and then issuing digital tokens that represent an interest in that underlying asset. Think of it like owning a mutual fund, but instead of receiving paper statements or holding it in your investment accounts, you receive a digital token that moves on a blockchain. </p>
  <p>These tokens can include any real-world assets (RWAs), from real estate and art to commodities and equities, but the current market value is notably concentrated in private credit and U.S. Treasuries. Private credit tops the charts by value—around the high teens of billions—followed by U.S. Treasuries, valued in the high single to low double-digit billions, with both segments growing quickly. Without further ado, let's go further into understanding private credit funds and Treasury funds. </p>
  <h3>Private Credit</h3>
  <p><strong>Private credit</strong> refers to nonbank lending and credit exposures—such as direct loans to companies, asset-backed facilities, or receivables financing—typically held by funds and institutional investors. In practice, a fund or institution originates or acquires a pool of these loans and places them into a Special Purpose Vehicle (SPV). The SPV then issues participation interests to investors seeking steady income from the underlying loan repayments. Tokenized private credit funds digitize these exposures, issuing tokens that represent participation in the resulting cash flows and risks. This segment is currently the largest component of the tokenized RWA market by value.</p>
  <p>A <strong>tokenized Treasury</strong> fund holds a portfolio of short-duration U.S. government securities, money market instruments, or similar cash-equivalent assets that are divided into shares. Fund managers or custodians hold the underlying securities, while investors receive blockchain-based tokens representing their share of the fund. These tokens can be minted, redeemed, and used as collateral or liquidity in on-chain applications—though minting and redemption are typically restricted to qualified or KYC-verified investors rather than open to the general public.</p>
  <aside>
  💡

  Decentralised finance (DeFi) refers to lending, borrowing, trading, and earning interest on blockchains using smart contracts—without banks, brokerages, or other traditional middlemen.

  </aside>

  <p>Let's dig into details on why these assets are more prominent in the blockchain sector, than others.</p>
  <ol>
  <li><strong>These assets already had institutional demand - tokenization just removed friction -</strong> These are the tried and tested asset classes that institutions already want exposure to. Tokenization did not create demand for them, it just made their access cheaper, faster and more programmable. Tokenized real estate or art by contrast had to simultaneously justify the asset class and the tokenization wrapper, which is a much harder sell. </li>
  <li><strong>They are standardized and fungible -</strong> A 3-month U.S. Treasury bill is identical to every other 3-month T-bill. A private credit loan to a company has standardized terms, interest rates, and maturities. This fungibility means tokens representing them can be traded, used as collateral, and composed with DeFi protocols easily.
  Compare that to real estate (every property is unique) or art (every piece is unique) — you can't build a liquid market or plug them into a DeFi lending protocol when every unit is different.</li>
  <li><strong>They solve a real, urgent problem for crypto-native users -</strong> This is probably the single biggest reason. Before tokenized Treasuries, stablecoin holders sitting on billions of dollars of USDC or USDT were earning zero yield — their money was essentially parked. Tokenized Treasuries gave them a way to earn ~4-5% on-chain without leaving the crypto ecosystem. That's an immediate, concrete problem solved.
  Private credit similarly offered DeFi users access to real-world yield — 8-12% — at a time when pure crypto yields had collapsed after 2022. The demand was already there, waiting.</li>
  </ol>
  <h3>The bigger question:</h3>
  <h4>Why tokenize the financial infrastructure?</h4>
  <p>There are multiple reasons:</p>
  <ol>
  <li><strong>Settlement speed and 24/7 access</strong> — When you trade through a brokerage account, settlement typically takes T+1 day, and you cannot trade after hours. Tokens are different: settlement can happen in real time.</li>
  <li><strong>Programmability</strong> — In the traditional model, assets simply represent ownership. If you want something to happen with them, such as paying dividends or using them as collateral, you need human intermediation. It cannot be automated. Tokens, on the other hand, can do this without intermediaries. You encode the rules for dividend payments, transfer of ownership, and KYC restrictions, and the token does the rest.</li>
  </ol>
  <p>Overall, tokens can help you ditch the middleman. But in practice, this is still more suited to institutions than to retail investors like you and me.</p>
  <h3>The catch?</h3>
  <h4>Like every other technological revolution, tokens have their downside as well.</h4>
  <ol>
  <li><strong>New and different sets of risks</strong> — The tokenization and crypto infrastructure might eliminate inter-party risk, but it brings along a completely new set of risks.<ol>
  <li><strong>Smart contract risk</strong> — The token’s code could have a bug or be exploited, even though the underlying Treasury is safe.</li>
  <li><strong>Issuer/custodian risk</strong> — You are trusting whoever runs the SPV (e.g., BlackRock) to actually hold the Treasuries they claim to, manage redemptions properly, and avoid operational failures.</li>
  <li><strong>Bridge and cross-chain risk</strong> — If the token needs to move across chains to be useful in different DeFi ecosystems, that introduces bridge exploits, historically one of the most hacked components in crypto.</li>
  </ol>
  </li>
  <li><strong>Regulatory exposure is still evolving, and DAOs/funds may face new compliance questions</strong> — A decentralized autonomous organization is a group of people who collectively control a pool of crypto assets through smart contracts and on-chain voting, rather than through a traditional corporate structure, which is similar to what a traditional investment company does with its assets. These DAOs are not registered under any law or jurisdiction yet, which raises the question of whether they are operating as unregistered investment companies under the facade of blockchain. </li>
  </ol>
  <h3>Where does this go from here?</h3>
  <p>Like most financial revolutions, tokenization didn’t start with a bang. It started with cartoon monkeys and million dollar JPEGs. The flashy assets were always going to be hard to standardize, hard to trade, and hard to regulate. So the technology quietly found its footing in the most boring corners of finance - and the boring ones just worked.</p>
  <p>This doesn’t mean that the hard part is over. The risks around smart contracts, legal clarity, and regulation aren’t minor footnotes - they’re the difference between tokenization becoming real financial infrastructure and remaining a well-funded niche experiment.</p>
  <p>The bigger question is who wins that future. Does tokenisation slowly eat into the traditional brokerage model, or do brokerages simply absorb the technology and offer everything a token can through apps we already use? That answer determines whether this reshapes finance from the outside, or quietly gets folded into the system it was supposed to disrupt.</p>
    `;

  <blockquote>
  <p><strong>Bias: “</strong><em>Error from simplifying assumptions in the model</em> - how far the average prediction of your algorithm is from the true underlying relationship you are trying to discover.”
  </p>
  <p><strong>Variance: “</strong><em>Error from sensitivity to the training data</em> - how much the model’s predictions would change if you trained it on a different (but similar) dataset.”
  </p>
  </blockquote>
  <h3>Introduction - Consider bias and variance in terms of darts:</h3>
  <p>Imagine you’re playing darts. If your darts land close to the bullseye every time, you are accurate (low bias). If your darts are clustered tightly together, even if not near the bullseye, you’re precise (low variance). In machine learning, <strong>bias determines accuracy</strong> - <em>how far off your predictions are from the true answer,</em> and, <strong>variance determines precision</strong> - <em>how much your predictions change when you use different training data</em>. </p>
  <p><strong><em>Bias</em></strong> is the error introduced by strong assumptions or an oversimplified model that cannot represent true relationship between inputs and outputs. In other words, when a model is too simple, it has high bias. High bias models tend to miss important relationships in data and produce similar, systematically wrong predictions across different training sets (underfit).</p>
  <p><strong><em>Variance</em></strong> is the error that results from the model being overly sensitive to a specific training dataset. In other words, when a model is too complex, it has high variance. High variance models fit the training data (including noise and outliers) very closely, so their predictions change a lot if the training set changes slightly, which leads to overfitting. </p>
  <p>Formally, under squared error loss, the expected prediction error at a point can be decomposed into:</p>
  <p><code>
  Bias^2 + Variance  ^1 + (Irreducible -noise)</p>
  <p></code></p>
  <h3>Impact on Accuracy and Prediction:</h3>
  <p>Bias and Variance directly drive training and test accuracy in characteristic ways:</p>
  <ul>
  <li><strong>High Bias - Underfitting:</strong><ul>
  <li>Training and test errors are both high because the model is too simple to capture the underlying pattern.</li>
  <li>Predictions are stable but systematically wrong (eg. a linear model trying to fit a highly non-linear relationship)</li>
  </ul>
  </li>
  <li><strong>High Variance - Overfitting:</strong><ul>
  <li>Training error is very low, but test error is high because the model is fitting noise in the training data.</li>
  <li>Small changes in training data can cause large changes in the learned model and its predictions, hurting reliability on unseen data.</li>
  </ul>
  </li>
  <li>
  <p><strong>Balanced Bias and Variance - Good Generalisation:</strong></p>
  <p>A well chosen model complexity yields moderate bias and moderate variance, typically giving the lowest error on validation / test data.</p>
  <p>So, overall predictive accuracy on unseen data is high only when the model avoids both extremes: not too simple (high bias) and not too complex (high variance).</p>
  </li>
  </ul>
  <h3>Bias-Variance Tradeoff and Model Complexity:</h3>
  <p>As model complexity increase (more parameters, deeper trees, higher-degree polynomials, etc.), bias and variance move in opposite directions.</p>
  <ul>
  <li>Simple models - Low Complexity:<ul>
  <li>High bias: They cannot express complex relationships.</li>
  <li>Low variance: They change little across different training samples.</li>
  </ul>
  </li>
  <li>Complex model - High Complexity:<ul>
  <li>Low bias: They can fit training data very closely.</li>
  <li>High variance: They are unstable and sensitive to noise and sample idiosyncrasies.</li>
  </ul>
  </li>
  </ul>
  <p>This gives the classic U-shaped curve for test error vs complexity:</p>
  <p>The curve illustrates that, on increasing model complexity, the model error decreases as first (as bias drops), then increasing again (as variance dominates).</p>
  <p>The bias-variance tradeoff is the fundamental tension that you cannot usually minimise both at the same time; improving one often worsens another, so we choose a “sweet-spot” using validation data, regularisation, early stopping, etc.</p>
  <h3>Bagging: Effect on Bias, Variance and Outcome</h3>
  <aside>
  💡

  Bagging - Bootstrap Aggregation is an ensemble learning method where you train multiple versions of the same model on different bootstrap samples of the training data  (random samples drawn with replacement) and then aggregate their predictions by averaging (regression) or majority vote (classification) to improve accuracy and stability by mainly reducing variance.

  Ensemble: It is a collection of multiple models whose predictions are combined to produce a single, usually more accurate and robust, final prediction than any individual model alone.

  </aside>

  <ul>
  <li>Effect on variance and bias:<ul>
  <li>Bagging’s main effect is to reduce variance by averaging many high-variance base models trained on different subsets.</li>
  <li>The bias typically stays similar to the bias of the base learner, because each model is still of the same type (eg. fully grown decision tree)</li>
  </ul>
  </li>
  <li>Why does variance drop?<ul>
  <li>Each base model may overfit its bootstrap sample, but their errors tend to be somewhat uncorrelated; averaging cancels much of this noise and yields a smoother, more stable prediction function</li>
  </ul>
  </li>
  <li>Typical outcomes:<ul>
  <li>Greatly improved stability: predictions are less sensitive to particular training samples.</li>
  <li>Reduced overfitting and improved test accuracy, especially for unstable learners like deep decision trees.</li>
  <li>Examples include random forests, which further de-correlate trees using random feature selection, giving even stronger variance reduction.</li>
  </ul>
  </li>
  </ul>
  <p>When to prefer bagging: use it when your base model is powerful but unstable and overfits (high variance, low bias) - for example, deep trees on tabular data.</p>
  <h3>Boosting: Effect on Bias, Variance and Outcomes</h3>
  <aside>
  💡

  Boosting is an ensemble learning method where many weak learners (individually only slightly better than random) are trained sequentially, and each new model focuses on correcting the errors of the previous ones; their outputs are then combined - typically as a weighted sum or vote - to form a single strong model with much higher accuracy, mainly by reducing bias.

  Ensemble: It is a collection of multiple models whose predictions are combined to produce a single, usually more accurate and robust, final prediction than any individual model alone.

  </aside>

  <p>Boosting builds an ensemble sequentially: each new model is trained to correct the errors of the current ensemble, often by reweighing misclassified examples (eg. AdaBoost) or fitting residuals (gradient boosting).</p>
  <ul>
  <li>Effect on bias and variance:<ul>
  <li>Boosting primarily reduces bias by turning many weak learners (high-bias models like shallow trees or stumps) into a strong learner.</li>
  <li>As more stages are added, training error can be driven very low, so bias falls, but variance can increase and the ensemble may eventually overfit if pushed too far.</li>
  </ul>
  </li>
  <li>Why bias drops?<ul>
  <li>Each new weak learner focuses on examples the current ensemble gets wrong, gradually fitting more subtle structure and capturing more complex decision boundaries that a single weak model cannot represent.</li>
  </ul>
  </li>
  <li>Typical outcomes:<ul>
  <li>Much stronger predictive performance than a single weak learner, often achieving state-of-the-art accuracy in many tasks.</li>
  <li>Ability to handle complex, nonlinear patterns with relatively simple base models.</li>
  <li>Higher risk of overfitting and sensitivity to noise or label errors if you run too many boosting iterations or use complex base learners.</li>
  </ul>
  </li>
  </ul>

 <h3>Overfitting vs. Underfitting</h3>
<ol>
 <li><strong>Overfitting:</strong> It happens when a model learns the noise in the training data instead of the underlying pattern. It performs well in training but fails on unseen examples. Think of a student memorising the answers to practice questions but struggling at the actual test.</li>
 <li><strong>Underfitting:</strong> It occurs when a model is too simple to capture patterns, leading to poor results both in training and testing. It’s like trying to predict the outcome of chess by flipping a coin - your assumptions about the game are too shallow! There is a high bias and low variance in the model. Underfitting is easy to spot: it shows ups even when modelling the training dataset.</li>

<ol>
 <li><strong>Bias:</strong> *Error from simplifying assumptions in the model* - how wrong are the predictions in the model from the actual outcomes.</li>
 <li><strong>Variance:</strong> *Error that is too sensitive to the training data* - it measure’s how much the model’s predictions would change if you trained it on a similar but different dataset</li>

<p>The sweet spot lies in between: a model complex enough to capture patterns, but regularised enough to generalise.</p>

<h3>Case Study: An Image Classifier</h3>

<p>Imagine we are training a simple CNN to classify handwritten digits (MNIST)</p>

<ul>

 <li>Underfit model: With too few filters or overly aggressive dropout, the odel can’t distinguish features, leading to low accuracy everywhere.</li>

<h3>Regularisation: L1 and L2</h3>

<aside>
🖥️

Regularisation: A set of techniques used to prevent models from falling into pitfalls like overfitting and underfitting. Key idea: Regularisation helps models focus on real patterns in the data, and not just the noise.

</aside>

<p>Regularisation helps tame overfitting by penalising large weights in the network</p>

<ul>
 <li>L1 regularisation (Lasso): Adds a penalty proportional to the absolute values of weights. This tends to drive irrelevant weights to zero, yielding sparse models that ignore noise.</li>
</ul>

<aside>
💡

Weights: In a neural network, weights are the numbers the model learns to connect inputs to outputs. Think of them as the “knobs” the model turns to make predictions. Each connection between neurons has a weight.

Large Weights: If a weight is very large (positive or negative), it means the model is relying heavily on that particular input or feature. Sometimes, this can make the model too sensitive to small changes or noise in the data.

</aside>

<ul>
 <li>L2 regularisation: Penalises the square of the weights. This keeps the weights small, but not zero, promoting smoother, more stable decision boundaries.</li>
</ul>

<p>In our image classifier, applying L2 regularisation to convolutional and dense layers prevents extreme weight values and helps model capture essential patterns without locking onto random pixel noise.</p>

<h3>Cross-Validation in Production</h3>

<p>Production ML teams don’t just train once and hope - it’s standard practice to use cross-validation. By splitting the data into multiple folds and rotating which subset is used for testing, teams can measure how well the model generalises across different samples.</p>

<ol>
 <li><strong>Split the data:</strong> Divide the dataset into <strong>K</strong>-folds.</li>

 </li>
 <li><strong>Repeat:</strong> Do this k times so that each fold is used at least once to train the model.</li>
 <li><strong>Aggregate:</strong> Average the performance scores from all <strong>k</strong> runs to get a more reliable estimate of how your model will perform on new, unseen data.</li>
</ol>

<p>This prevents the trap of “training set luck”, ensuring models aren’t just performing well on one convenient split. Combined  with L1/L2 regularisation, cross-validation helps build models that resist memorisation and perform reliably in the wild. </p>

 <li>Regularisation (L1/L2) combats overfitting by controlling weight magnitudes.</li>
 <li>Cross-validation ensures performance generalises beyond training data.</li>
</ul>

<p>When debugging models in the wild, the goal isn’t perfection on past data - it’s resilience in the unpredictable messiness of the future.</p>

<p>Data-mesh is a decentralised approach to data architecture, treating data like a product owned by specific business domains (eg. marketing or financial teams) rather than a central IT group. It is a set of principles for designing modern data architecture. It is very similar to how micro-services are sets of principles for modern software development.</p>

<h3>Core principles comprising Data-Mesh</h3>

<p>The principle that comprise. data-mesh are all technology agnostic - meaning they don’t rely on specific tools, platforms or technologies for implementation.Instead, they emphasise organisational structures, processes and conceptual frameworks that can be applied flexibly across diverse tech-stacks, from cloud native solutions to on premises systems.</p>

<p>The nest way to think a data-mesh is to frame the problem it solves</p>

<p>Data-mesh lets you scale data architecture in two ways:</p>

<li>Firstly, from the technological standpoint: Can I add enough computers to make it run fast enough? - it is fundamentally scalable in that way.</li>

<p>The four principles that govern how data is managed in a mesh:</p>

<li><strong>Data ownership by domain:</strong> Data is owned by a specific domain. The data in the data-mesh is broken down around a specific domain in that business. Access to that data is then decentralised. Each business domain manages its own data pipelines, quality and sharing. Domains handle both operational and analytical data, enabling autonomous decision-making and reducing bottlenecks.</li>
<li><strong>Data as a product:</strong> Data is considered a product by each team that publishes it. A team owns data. That team has to engage in product thinking about the data. They’re wholly responsible for it. Its quality, its representation and its cohesiveness.</li>
<li><strong>Data available everywhere, self-serve:</strong> This principle introduces a shared platform that abstracts away complex infrastructure, allowing domain teams to build and manage data products independently through self-service tools for provisioning, monitoring, and orchestration. It prioritises abstractions and ease-of-use over specific technical implementations. The main objective is to minimise specialised skills requirements, enabling teams to connect their preferred tools without becoming dependent on any particular technology ecosystem. </li>

<h3>Hands-on example: Building a data-mesh pipeline</h3>

<p>Let’s simulate a mini data mesh in Python using Pandas and a mock domain setup. Imagine two domains: “Sales” owning transactional data and “Marketing” consuming it as a product.</p>

<aside>

<p>Artificial Intelligence: It is the field of computer science focused on creating machines or systems that can perform tasks typically requiring human intelligence. These tasks include learning, reasoning, problem-solving, perception, language understanding, and decision-making.</p>

<p>Gradient Descent is the backbone of how machine learning models improve during training. It is an iterative process: the model makes predictions, calculates how wrong it was (the loss), and then tweaks its parameters to do better next time. This cycle repeats, gradually reducing the error.</p>

<aside>
🧠
<p>Neural Network: It is a network of artificial neurons that are connected to each other in layers. These layers have weights and biases that describe how we navigate through the network.</p>

<h3>Algorithm on which gradient descent works:</h3>
<li>Start with the initial guesses (they can be random)</li>
<li>Compute the gradient (the slope or direction of steepest ascent) of the cost function with respect to each parameter.</li>

<aside>
🖥️
<p>Cost Function: A function that tells us how far off our predictions are from the actual value. Lower the cost function, better the prediction and vice-versa.</p>
</aside>

<li>Update the parameter by moving it a small step in the opposite direction of the cost function (since we want to minimise and not maximise the cost function).</li>
<li>Repeat the process until the changes become very small (algorithm has converged to a minimum).</li>

<h3>The Math Behind Optimization Loops</h3>
<p>At each step, gradient descent computes the gradient (think: slope) of the loss function with respect to each parameter. The model then updates its parameters in the direction that reduces the loss:</p>
<pre><code>θnew = θold − η∇L(θold)
</code></pre>
<p>where θ are the parameters, η is the learning rate, and ∇L is the gradient of the loss.</p>

<h3>Why Learning Might Stall at 99% Accuracy</h3>
<p>A machine learning model's learning can stall at 99% accuracy for several key reasons:</p>
<li><strong>Class Imbalance:</strong> If the training data set is heavily imbalanced (eg. 99% of samples belong to one class), a model simply predicts the majority class for every input and achieves 99% accuracy. This appears high, but the model isn't truly learning to distinguish between classes — it is just exploiting the imbalance, and real-world performance could be poor on minority cases.</li>
<li><strong>Diminishing returns:</strong> As a model gets closer to perfect accuracy, incremental improvements become much harder and often require disproportionately more effort, more data, deeper models, or clever algorithms. Getting from 90% to 99% is easier than 99% to 99.9%.</li>
<li><strong>Data or Label Issues:</strong> High accuracy can mask problems such as mislabeled data, duplicated data (data leakage), or validation data that closely resembles the training set. These issues artificially inflate accuracy scores but stall genuine learning progress.</li>
<li><strong>Local Minima and Optimisation Plateaus:</strong> Gradient descent may get stuck in a local minimum or reach a plateau where the cost function doesn't decrease further, causing learning to stall even before true optimal performance is reached. Tweaking hyperparameters like learning rate or optimiser can sometimes help escape these plateaus.</li>
<li><strong>Lack of Diversity:</strong> If the model rarely encounters edge cases or unusual examples during training, it won't learn to recognise them. Stalling at 99% accuracy may mean the model fails only on these rare, hard instances, which are crucial in many real-world applications.</li>
<li><strong>Overfitting:</strong> Models that memorise the training set can stall in learning, showing high accuracy on seen data but falling badly on new, unseen samples. Overfitting typically leads to a plateauing accuracy curve and poor performance beyond the training distribution.</li>

<h3>Tricks to Speed Up Learning: Momentum</h3>
<p>Momentum helps the model push through flat regions and avoid getting stuck. Instead of just following the current gradient, it also considers past gradients:</p>
<pre><code>v(t+1) = γvt + η∇L(θt)
θ(t+1) = θt − v(t+1)
</code></pre>
<p>where v is the velocity (accumulated gradient), and γ is the momentum coefficient.</p>

<p><strong>Proxy Variables:</strong> Seemingly neutral features like zip code or school encode protected characteristics. Amazon's algorithm learned to favour verbs like "executed" that men use more frequently, creating a gender bias without directly considering your gender.</p>

<h3>Auditing Datasets With Fairlearn:</h3>

<p>Fairlearn, Microsoft's open-source toolkit, provides infrastructure for bias detection. It enables data scientists to measure fairness through specific, actionable metrics.</p>

<p>Demographic Parity: Equal selection rates across groups. If your hiring algorithm selects more than 40% of men but 15% of women, it fails this test.</p>

<p>Equalised Odds: Equal true positive and false positive rates across groups - catching disparities in both who gets hired and who gets wrongly rejected.</p>

<aside>
🖥️
<p><strong>True Positive:</strong> The model correctly predicts a positive outcome for someone who is actually positive according to reality.</p>
<p><strong>True Positive Rates:</strong> The proportion of actual positives correctly identified by the model.</p>
<p><strong>Equalised odds requires:</strong> The TPR to be the same across all sensitive groups, so qualified people in every group have an equal chance of being predicted positive.</p>
</aside>

<aside>
⚠️
<p><strong>False Positive:</strong> The model incorrectly predicts a positive outcome for someone who is actually negative according to the reality.</p>
<p><strong>False Positive Rate:</strong> The proportion of actual negatives incorrectly labeled as positive.</p>
<p><strong>Equalised odds requires:</strong> The FPR to be the same across all sensitive groups, preventing the model from unfairly flagging one group as a higher risk than another.</p>
</aside>

<p>Equal Opportunity: Ensures qualified individuals from all groups have equal chances of correct identification.</p>

<p>Using FairLearn's MetricFrame API, teams calculate group-specific metrics and visualise performance gaps in minutes. This reveals disparities that aggregate metrics hide, enabling data driven bias fixes.</p>

<h3>Three Stage Mitigation Pipeline</h3>

<p><strong>Pre-processing</strong> (fix the data): Reweigh, resample, or transform training data before model training. Techniques like SMOTE generate synthetic samples for underrepresented groups, balancing datasets without duplicating data.</p>

<p><strong>In-processing</strong> (Fair Learning): Modify the training algorithm itself to optimise for both accuracy and fairness. Fairness constraints penalise unfair predictions alongside incorrect ones, baking equity into the model. Exponentiated gradient reduction iteratively adjusts classifier weights to satisfy fairness constraints like demographic parity.</p>

<p><strong>Post-processing</strong> (Adjust Outputs): Apply different decision thresholds to different groups after training, useful when retraining isn't feasible. While simpler, this approach is generally less effective than early intervention.</p>

<h3>Why Continuous Monitoring Matters</h3>

<p>Bias doesn't end at deployment. Models that appear fair today can drift into discrimination as data distributions change or user demographics shift. Effective organisations implement continuous monitoring tracking:</p>

<li>Fairness metrics alongside accuracy and recall.</li>
<li>Data drift revealing demographic shifts in input distributions.</li>
<li>Bias emergence through regular fairness audits.</li>

<p>Under the EU AI Act (effective August 2024), organisations face fines up to $35 Million or 7% of turnover for non-compliance with fairness requirements. Proactive monitoring isn't optional - it's now legally mandated.</p>

<h3>Enterprise Best Practices</h3>

<li>Use diverse training data covering broad demographics and geographies.</li>
<li>Maintain human oversight for high-stake decisions - don't let AI make unilateral calls.</li>
<li>Conduct independent audits rather than trusting vendor claims of fairness.</li>
<li>Leverage explainability tools like SHAP to understand which features drive predictions.</li>
<li>Establish governance structures with clear accountability and cross-functional ethics committees.</li>

<h3>The Bottom Line</h3>

<p>Algorithmic bias isn't a technical problem to be solved in isolation - it's a systems problem requiring technical rigor, organisational commitment, and continuous vigilance. Companies like Microsoft have dramatically improved fairness through structured audits; facial recognition accuracy for darker-skinned women improved from 79% to 93%.</p>

<p>Organisations deploying biased AI don't just face regulatory risk - they face litigation, reputation damage, and operational friction. Conversely, companies embracing fairness as a strategic priority earn trust, attract diverse talent, and build better decision-making systems.</p>

<p>The tools exist. The regulations are clear. What remains is organisational will to implement fair AI at scale. In 2025, fairness isn't a compliance checkbox - it's a competitive advantage.</p>

<p>At its core is a deceptively simple yet profoundly powerful idea: <strong>attention</strong>. By allowing machines to <em>focus on the most relevant parts of a sentence or sequence</em>, transformers have eclipsed traditional neural networks and enabled models to scale to mind-boggling levels.</p>

<p>Transformers are a specific type of neural network.</p>

<h3>What is Self-Attention and How Does it Work?</h3>

<p>Self-attention is a mechanism that helps a transformer model determine which parts of an input are most relevant to each word it processes. In a sentence, not all words equally influence the meaning of a particular word. Self-attention computes a set of "attention-scores" that quantify this relevance, letting each word attend to others, including itself, to build rich, context aware representations.</p>

<p>In other words, a transformer attempts to identify context that brings meaning to the word in the sequence.</p>

<h3>PyTorch Code Walkthrough of Self-Attention</h3>

<pre><code>import torch
import torch.nn as nn

class SelfAttention(nn.Module):
    def __init__(self, d_in, d_out_kq, d_out_v):
        super().__init__()
        self.d_out_kq = d_out_kq
        self.W_query = nn.Parameter(torch.rand(d_in, d_out_kq))
        self.W_key   = nn.Parameter(torch.rand(d_in, d_out_kq))
        self.W_value = nn.Parameter(torch.rand(d_in, d_out_v))

    def forward(self, x):
        queries = x @ self.W_query
        keys    = x @ self.W_key
        values  = x @ self.W_value
        attn_scores  = queries @ keys.T
        attn_weights = torch.softmax(attn_scores / self.d_out_kq ** 0.5, dim=-1)
        context_vec  = attn_weights @ values
        return context_vec
</code></pre>

<p>In this code:</p>
<li>Each input (x) is projected into query, key, and value spaces.</li>
<li>Attention scores are computed; applying softmax converts them into probabilities.</li>
<li>The context vector (the weighted sum) is how each word learns from others in the sequence.</li>

<p>There are two fundamental units that make a transformer:</p>
<li><strong>Encoders:</strong> Transforming inputs to contextual representations. Process the input sequence and turns each input token into a <em>context-rich vector (embedding)</em> that captures the meaning and relationships between all tokens in the input. In other words, an encoder generates encodings that define which parts of the input sequence are relevant to each other and then pass these encodings to the next encoder layer.</li>
<li><strong>Decoders:</strong> Producing output sequence. Generates the output sequence, <em>one token at a time</em>, using both the encoder's full output and the partial output sequence generated so far. In other words, the decoder takes all of the encodings from the transformer and uses their derived context to generate the output sequences.</li>

<h3>Semi-Supervised Learning</h3>

<p>Transformers follow a semi-supervised method of learning.</p>

<p>This means that, transformers are pre-trained in an <code>unsupervised manner</code> - on large, unlabelled datasets and <em>fine-tuned</em> by <code>supervised learning</code> to get them to perform better.</p>

<p>Transformers do not necessarily process data in order. They run multiple sequences of training data in parallel. This speeds up training times.</p>

<h3>Tokenisation</h3>

<aside>
📌
<p>Tokens: Pieces into which the input is broken down by the transformer.</p>
</aside>

<p>Procedure:</p>
<li>Input is broken down into tokens.</li>
<li>Each token is then associated with a vector, which is somehow meant to encode the meaning of that piece. Think of these vectors as coordinates in a very high dimensional space. Words with similar meanings tend to land on vectors that are close to each other in that space.</li>
<li>This sequence of vectors then passes through an operation (<strong>attention block</strong>). An attention block allows vectors to communicate with each other and pass information back and forth to update their values.</li>
<li>The updated vectors then pass through another operation, multilayer perception. In multilayer perception these vectors do not communicate internally. They all go through the same operation in parallel. It is like asking a long list of questions about each vector and updating them based on the answers.</li>
<li>All the operations in both these blocks look like a giant piece of matrix multiplication.</li>
<li>The process then repeats, with tokens going back and forth from attention block to multilayer perception blocks until context is converted into output.</li>

<h3>Why Scaling to Billions of Parameters Eats GPUs</h3>

<p>Transformers scale by dramatically increasing parameter counts - the weights used in attention, feed forward networks, and embeddings. Each increase in size multiplies memory and compute requirements:</p>
<li>Each attention calculation is quadratic in sequence length, intensifying GPU memory usage.</li>
<li>Large models, such as those at the scale of billions of parameters, require massive parallelisation - spreading a single model across multiple GPUs to manage both memory demands and training speed.</li>
<li>Specialised hardware infrastructure and clever parallelisation strategies are necessary to efficiently utilise resources and make training feasible.</li>

<h3>The Bottom Line</h3>

<p>Transformers, with their signature self-attention mechanism, enable models to read context sensitively and generate sophisticated responses. However, this power comes with steep computational demands: training multi-billion-parameter models consumes enormous GPU fleets and ingenious engineering to keep up with the appetite for speed and money.</p>
